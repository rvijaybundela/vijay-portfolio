<section class="py-16 max-w-4xl mx-auto text-center">
  <h2 class="text-3xl font-bold text-pink-300 mb-8">Contact Me</h2>
  <form class="space-y-4">
    <input type="text" placeholder="Name" class="w-full p-3 rounded bg-slate-800 border border-slate-700 text-white">
    <input type="email" placeholder="Email" class="w-full p-3 rounded bg-slate-800 border border-slate-700 text-white">
    <textarea placeholder="Message" class="w-full p-3 rounded bg-slate-800 border border-slate-700 text-white"></textarea>
    <button class="bg-cyan-400 hover:bg-cyan-500 text-black px-6 py-3 rounded">Send</button>
  </form>
