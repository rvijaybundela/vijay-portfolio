<section class="py-16 max-w-5xl mx-auto">
  <h2 class="text-3xl font-bold text-center text-pink-300 mb-8">Projects</h2>
  <div class="grid md:grid-cols-2 gap-6">
    {% for proj in user.projects %}
    <div class="bg-slate-800 p-6 rounded-lg border border-slate-700 card hover:shadow-lg hover:scale-105 transition">
      <h4 class="text-2xl font-semibold text-white mb-2">{{ proj.title }}</h4>
      <p class="text-slate-300 mb-4">{{ proj.desc }}</p>
      <a href="{{ proj.link }}" target="_blank" class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded">View More</a>
    </div>
    {% endfor %}
  </div>
</section>
