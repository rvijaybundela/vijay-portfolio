<section class="py-16 max-w-5xl mx-auto">
  <h2 class="text-3xl font-bold text-center text-pink-300 mb-8">Skills</h2>
  <div class="grid md:grid-cols-2 gap-6">
    {% for category, items in user.skills.items() %}
    <div class="bg-slate-800 p-6 rounded-lg border border-slate-700 card">
      <h3 class="text-xl text-cyan-300 mb-4">{{ category }}</h3>
      <div class="flex flex-wrap gap-3">
        {% for skill in items %}
        <span class="bg-slate-700 px-3 py-1 rounded text-sm text-white hover:bg-pink-400 transition">{{ skill }}</span>
        {% endfor %}
      </div>
    </div>
    {% endfor %}
  </div>
</section>
