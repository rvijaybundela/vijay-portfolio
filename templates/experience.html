<section class="py-16 max-w-4xl mx-auto">
  <h2 class="text-3xl font-bold text-center text-pink-300 mb-8">Experience</h2>
  <div class="space-y-6">
    {% for exp in user.experience %}
    <div class="relative pl-10 card">
      <div class="absolute left-0 top-2 w-6 h-6 bg-cyan-400 rounded-full"></div>
      <h3 class="text-xl font-semibold text-white">{{ exp.title }} <span class="text-slate-400">({{ exp.duration }})</span></h3>
      <ul class="list-disc list-inside text-slate-300">
        {% for detail in exp.details %}
        <li>{{ detail }}</li>
        {% endfor %}
      </ul>
    </div>
    {% endfor %}
  </div>
</section>
